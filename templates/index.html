<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Helium X-Ray Analytics</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

/* ======================================== */
/* RESET */
/* ======================================== */

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:'Poppins',sans-serif;
background:#f5f7fb;
color:#1e293b;
}

/* ======================================== */
/* CONTAINER */
/* ======================================== */

.container{
width:100%;
padding:35px 45px;
}

/* ======================================== */
/* HEADER */
/* ======================================== */

.top-bar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:25px;
}

.title-section h1{
margin:0;
font-size:26px;
font-weight:600;
color:#0f172a;
}

/* ======================================== */
/* BUTTONS */
/* ======================================== */

.action-buttons{
display:flex;
gap:10px;
align-items:center;
}

button{
height:40px;
padding:0 20px;
border:none;
border-radius:8px;
font-size:13px;
font-weight:500;
cursor:pointer;
transition:all .25s ease;
}

.export-btn{
background:#10b981;
color:white;
box-shadow:0 4px 12px rgba(16,185,129,.35);
}

.analyze-btn{
background:#3b82f6;
color:white;
box-shadow:0 4px 12px rgba(59,130,246,.35);
}

button:hover{
transform:translateY(-2px);
box-shadow:0 8px 20px rgba(0,0,0,.15);
}

/* ======================================== */
/* KPI CARDS */
/* ======================================== */

.kpi-section{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
margin-bottom:25px;
}

.kpi-card{
background:white;
border-radius:12px;
padding:20px;
box-shadow:0 6px 25px rgba(0,0,0,0.06);
}

.kpi-title{
font-size:12px;
color:#64748b;
margin-bottom:8px;
}

.kpi-value{
font-size:24px;
font-weight:600;
color:#0f172a;
}

/* ======================================== */
/* FILTER BAR */
/* ======================================== */

.filter-bar{
background:white;
padding:18px 20px;
border-radius:12px;
display:flex;
gap:20px;
flex-wrap:wrap;
margin-bottom:25px;
box-shadow:0 4px 18px rgba(0,0,0,.05);
}

.filter-item{
display:flex;
flex-direction:column;
gap:6px;
}

.filter-item label{
font-size:11px;
font-weight:500;
color:#64748b;
}

/* ======================================== */
/* INPUT */
/* ======================================== */

select,input{
height:38px;
border-radius:8px;
border:1px solid #e2e8f0;
padding:0 12px;
font-size:13px;
background:white;
transition:all .2s ease;
min-width:140px;
}

input{
min-width:220px;
}

select:focus,input:focus{
outline:none;
border-color:#3b82f6;
box-shadow:0 0 0 3px rgba(59,130,246,.15);
}

/* ======================================== */
/* TABLE */
/* ======================================== */

.table-wrapper{
background:white;
border-radius:14px;
padding:20px;
box-shadow:0 8px 35px rgba(0,0,0,0.07);
overflow-x:auto;
}

table{
width:100%;
border-collapse:separate;
border-spacing:0;
font-size:13.5px;
}

th{
padding:14px 12px;
text-align:left;
font-weight:600;
color:#475569;
background:#f1f5f9;
border-bottom:1px solid #e2e8f0;
cursor:pointer;
}

th:hover{
background:#e8edf5;
}

td{
padding:12px;
border-bottom:1px solid #f1f5f9;
}

tr:hover td{
background:#f8fafc;
}

td:nth-child(6),
td:nth-child(7),
td:nth-child(8),
td:nth-child(9){
text-align:right;
font-variant-numeric:tabular-nums;
}

td:nth-child(6){
color:#0284c7;
font-weight:600;
}

td:nth-child(7){
color:#059669;
font-weight:600;
}

.loading{
font-size:13px;
color:#3b82f6;
margin-left:10px;
}

</style>
</head>

<body>

<div class="container">

<div class="top-bar">

<div class="title-section">
<h1>Helium X-Ray Analytics</h1>
</div>

<div class="action-buttons">
<button class="export-btn">Export</button>
<span id="loadingText" class="loading"></span>
<button class="analyze-btn" onclick="loadData()">Analyze</button>
</div>

</div>

<div class="kpi-section">

<div class="kpi-card">
<div class="kpi-title">Total Revenue</div>
<div class="kpi-value" id="kpiRevenue">₹0</div>
</div>

<div class="kpi-card">
<div class="kpi-title">Total Units</div>
<div class="kpi-value" id="kpiUnits">0</div>
</div>

<div class="kpi-card">
<div class="kpi-title">Average ASP</div>
<div class="kpi-value" id="kpiASP">0</div>
</div>

</div>

<div class="filter-bar">

<div class="filter-item">
<label>Month</label>
<select id="monthFilter"></select>
</div>

<div class="filter-item">
<label>Account</label>
<select id="brandFilter"></select>
</div>

<div class="filter-item">
<label>SubCategory</label>
<select id="subFilter"></select>
</div>

<!-- ADD HERE -->
<div class="filter-item">
<label>Compare</label>
<select id="compareMode">
<option value="none">None</option>
<option value="month">Month vs Month</option>
</select>
</div>

<div class="filter-item">
<label>Search</label>
<input type="text" id="searchInput" placeholder="Search...">
</div>

</div>

<div class="table-wrapper">

<table>

<thead>
<tr>
<th>
Month<br>
<select data-col="Month" onchange="columnFilter('Month',this.value)">
<option value="All">All</option>
</select>
</th>
<th>
Account<br>
<select data-col="BrandFolder" onchange="columnFilter('BrandFolder',this.value)">
<option value="All">All</option>
</select>
</th>
<th>
SubCategory<br>
<select data-col="SubCategory" onchange="columnFilter('SubCategory',this.value)">
<option value="All">All</option>
</select>
</th>
<th>
Brand Name<br>
<select data-col="Brand" onchange="columnFilter('Brand',this.value)">
<option value="All">All</option>
</select>
</th>
<th>
ASIN<br>
<select data-col="ASIN" onchange="columnFilter('ASIN',this.value)">
<option value="All">All</option>
</select>
</th>
<th onclick="sortTable('Revenue')">Revenue</th>
<th onclick="sortTable('Revenue %')">Market Share</th>
<th onclick="sortTable('Units')">Units</th>
<th onclick="sortTable('ASP')">ASP</th>
</tr>


</thead>

<tbody id="table-body"></tbody>

</table>

</div>

</div>

<script>

function columnFilter(col,value){

filteredData = allData.filter(r=>{

if(value==="All") return true

return String(r[col]).toLowerCase() === value.toLowerCase()

})

renderTable()

}

let allData=[]
let filteredData=[]
let filtersBuilt=false
let sortColumn=null
let sortAsc=true

function sortTable(col){

if(sortColumn===col){
sortAsc=!sortAsc
}else{
sortColumn=col
sortAsc=true
}

filteredData.sort((a,b)=>{

let v1=a[col]||""
let v2=b[col]||""

if(!isNaN(v1)&&!isNaN(v2)){
v1=Number(v1)
v2=Number(v2)
}

if(v1<v2) return sortAsc?-1:1
if(v1>v2) return sortAsc?1:-1
return 0

})

renderTable()
}
function formatNumber(n){
if(!n||isNaN(n)) return "0.00"
return Number(n).toLocaleString('en-IN',{minimumFractionDigits:2,maximumFractionDigits:2})
}

function formatPercent(n){
if(!n||isNaN(n)) return "0%"
return Number(n).toFixed(2)+"%"
}

async function loadData(){


document.getElementById("loadingText").innerText="Loading..."

const res=await fetch("/analyze")
const json=await res.json()

allData=json.data||json
filteredData=[...allData]

if(!filtersBuilt){
buildFilters()
filtersBuilt=true
}

applyFilters()

document.getElementById("loadingText").innerText=""

}


function buildFilters(){
const brandValue=document.getElementById("brandFilter")?.value || "All"

const monthSet=new Set()
const brandSet=new Set()
const subSet=new Set()

allData.forEach(r=>{
if(r.Month) monthSet.add(r.Month)
if(r.BrandFolder) brandSet.add(r.BrandFolder)
if(r.SubCategory && (brandValue==="All" || r.BrandFolder===brandValue)){
subSet.add(r.SubCategory)
}
})

const month=document.getElementById("monthFilter")
const brand=document.getElementById("brandFilter")
const sub=document.getElementById("subFilter")

month.innerHTML='<option value="All">All</option>'
brand.innerHTML='<option value="All">All</option>'
const previousBrand=brandValue
sub.innerHTML='<option value="All">All</option>'

monthSet.forEach(v=>month.innerHTML+=`<option value="${v}">${v}</option>`)
brandSet.forEach(v=>brand.innerHTML+=`<option value="${v}">${v}</option>`)
brand.value=previousBrand
subSet.forEach(v=>sub.innerHTML+=`<option value="${v}">${v}</option>`)

month.onchange=applyFilters
brand.onchange=()=>{
buildFilters()
applyFilters()
}
sub.onchange=applyFilters

document.getElementById("searchInput").onkeyup=applyFilters
buildColumnFilters()

function buildColumnFilters(){

const columns=["Month","BrandFolder","SubCategory","Brand","ASIN"]

columns.forEach(col=>{

const values=[...new Set(allData.map(r=>r[col]))]

const select=document.querySelector(`select[data-col='${col}']`)

if(!select) return

values.forEach(v=>{
select.innerHTML+=`<option value="${v}">${v}</option>`
})

})

}

}

function applyFilters(){

const m=document.getElementById("monthFilter").value
const b=document.getElementById("brandFilter").value
const s=document.getElementById("subFilter").value
const search=document.getElementById("searchInput").value.toLowerCase()
const compare=document.getElementById("compareMode").value

filteredData=allData.filter(r=>{

if(m!=="All" && r.Month!==m) return false
if(b!=="All" && r.BrandFolder !== b) return false
if(s!=="All" && r.SubCategory !== s) return false

if(search){
const text=JSON.stringify(r).toLowerCase()
if(!text.includes(search)) return false
}

return true

})

updateKPIs()

renderTable()

if(compare==="month"){

let compareData={}

filteredData.forEach(r=>{
const key=r.Month

if(!compareData[key]){
compareData[key]={Revenue:0,Units:0}
}

compareData[key].Revenue+=Number(r.Revenue||0)
compareData[key].Units+=Number(r.Units||0)

})

let compHtml="<tr style='background:#fef3c7;font-weight:600'>"
compHtml+=`<td colspan="5">Month Comparison</td>`
compHtml+=`<td>${formatNumber(compareData[Object.keys(compareData)[0]].Revenue)}</td>`
compHtml+=`<td>-</td>`
compHtml+=`<td>${formatNumber(compareData[Object.keys(compareData)[0]].Units)}</td>`
compHtml+=`<td>-</td>`
compHtml+="</tr>"

document.getElementById("table-body").insertAdjacentHTML("afterbegin",compHtml)

}

}

function updateKPIs(){

let revenue=0
let units=0

filteredData.forEach(r=>{
revenue+=Number(r.Revenue||0)
units+=Number(r.Units||0)
})

const asp=units?revenue/units:0

document.getElementById("kpiRevenue").innerText="₹"+formatNumber(revenue)
document.getElementById("kpiUnits").innerText=formatNumber(units)
document.getElementById("kpiASP").innerText=formatNumber(asp)

}


function renderTable(){

const tbody=document.getElementById("table-body")

let html=""

filteredData.forEach(r=>{

html+=`
<tr>
<td>${r.Month||""}</td>
<td>${r.BrandFolder||""}</td>
<td>${r.SubCategory||""}</td>
<td>${r.Brand||""}</td>
<td>${r.ASIN||""}</td>
<td>${formatNumber(r.Revenue)}</td>
<td>${formatPercent(r["Revenue %"])}</td>
<td>${formatNumber(r.Units)}</td>
<td>${formatNumber(r.ASP)}</td>
</tr>
`

})

tbody.innerHTML=html

}

window.onload=loadData

</script>

</body>
</html>
